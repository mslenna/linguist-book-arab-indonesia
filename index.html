<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#059669">
    <title>LinguistBook Pro - Arabic Translator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --paper-bg: #fffef0;
            --paper-text: #1e293b;
            --overlay-bg: #fffef0;
            --overlay-text: #1e293b;
            --page-transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            background: #0f172a;
            color: #f1f5f9;
            --overlay-bg: #0f172a;
            --overlay-text: #f1f5f9;
        }

        body.dark-mode {
            background: #0f172a;
            color: #f1f5f9;
        }

        body.dark-mode .bg-white {
            background-color: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .text-slate-800 {
            color: #f1f5f9;
        }

        body.dark-mode .text-slate-700 {
            color: #e2e8f0;
        }

        body.dark-mode .text-slate-500 {
            color: #94a3b8;
        }

        body.dark-mode .bg-slate-50 {
            background-color: #0f172a;
        }

        body.dark-mode .border-slate-200 {
            border-color: #334155;
        }

        #readingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--overlay-bg);
            color: var(--overlay-text);
            overflow-y: auto;
            transition: background 0.3s ease;
        }

        .reading-active #readingOverlay {
            display: block;
        }

        .serif-font {
            font-family: 'Crimson Pro', serif;
        }

        .book-container {
            perspective: 2500px;
        }

        .paper {
            background: var(--paper-bg);
            color: var(--paper-text);
            background-image: linear-gradient(90deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0) 97%, rgba(0, 0, 0, 0.03) 100%);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            transition: var(--page-transition);
            min-height: 500px;
        }

        .paper-sepia {
            --paper-bg: #f4ecd8;
            --paper-text: #433422;
        }

        .paper-white {
            --paper-bg: #ffffff;
            --paper-text: #1e293b;
        }

        .paper-dark {
            --paper-bg: #1e293b;
            --paper-text: #f1f5f9;
        }

        .spine {
            width: 20px;
            background: linear-gradient(90deg, #94a3b8, #cbd5e1, #94a3b8);
            z-index: 10;
        }

        @keyframes pageTurn {
            0% {
                transform: rotateY(0deg);
            }

            50% {
                transform: rotateY(-10deg) scale(1.02);
                filter: brightness(1.1);
            }

            100% {
                transform: rotateY(0deg);
            }
        }

        .page-active {
            animation: pageTurn 0.8s ease-in-out;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @media (max-width: 768px) {
            .paper {
                min-height: 300px;
            }

            .spine {
                display: none;
            }
        }
    </style>
</head>

<body class="p-3 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6">
            <div class="text-center md:text-left">
                <h1
                    class="text-3xl font-extrabold text-slate-800 flex items-center justify-center md:justify-start gap-2">
                    <span class="bg-emerald-600 text-white px-3 py-1 rounded-xl">L</span>
                    <span>Linguist<span class="text-emerald-600">Book</span> <span
                            class="text-slate-400 font-light text-xl italic">Pro</span></span>
                </h1>
                <p class="text-slate-500 text-sm mt-1">
                    Sastra Arab-Indonesia •
                    <a href="https://sobari.vercel.app" target="_blank"
                        class="text-emerald-600 hover:underline font-semibold decoration-emerald-300">
                        Created By Muhamad Sobari
                    </a>
                </p>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleGlobalDarkMode()"
                    class="p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50"
                    title="Gelap/Terang">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>

                <button onclick="toggleReadingMode()"
                    class="p-2 rounded-xl bg-white border border-slate-200 text-slate-600 hover:bg-slate-50"
                    title="Mode Membaca">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5S19.832 5.477 21 6.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </button>

                <div class="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                    <button onclick="toggleSettings()"
                        class="w-8 h-8 flex items-center justify-center hover:bg-slate-50 rounded-lg text-slate-600 border-r pr-3 mr-1"
                        title="Pengaturan AI">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                        </svg>
                    </button>
                    <div class="flex gap-1 border-r pr-3 border-slate-100">
                        <button onclick="changeFontSize(-2)"
                            class="w-8 h-8 flex items-center justify-center hover:bg-slate-50 rounded-lg text-slate-600">A-</button>
                        <button onclick="changeFontSize(2)"
                            class="w-8 h-8 flex items-center justify-center hover:bg-slate-50 rounded-lg text-slate-600 font-bold">A+</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setTheme('white')"
                            class="w-6 h-6 rounded-full bg-white border border-slate-200 shadow-sm"></button>
                        <button onclick="setTheme('sepia')"
                            class="w-6 h-6 rounded-full bg-[#f4ecd8] border border-orange-100 shadow-sm"></button>
                        <button onclick="setTheme('dark')"
                            class="w-6 h-6 rounded-full bg-[#1e293b] border border-slate-800 shadow-sm"></button>
                    </div>
                </div>
            </div>
        </header>

        <div id="apiKeyPanel"
            class="hidden mb-6 bg-white p-6 rounded-3xl shadow-xl transition-all border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest">Pilih Model
                        AI</label>
                    <div class="flex gap-2">
                        <button onclick="switchProvider('gemini')" id="btnGemini"
                            class="flex-1 py-3 px-4 rounded-xl border-2 border-emerald-600 bg-emerald-50 text-emerald-700 font-bold text-sm flex items-center justify-center gap-2 transition-all">Google
                            Gemini</button>
                        <button onclick="switchProvider('openai')" id="btnOpenAI"
                            class="flex-1 py-3 px-4 rounded-xl border-2 border-slate-200 text-slate-400 font-bold text-sm flex items-center justify-center gap-2 transition-all">ChatGPT
                            (OpenAI)</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest">API Key <span
                            id="keyLabel">Gemini</span></label>
                    <div class="flex gap-2">
                        <input type="text" id="apiKeyInput" placeholder="Tempel kunci API di sini..."
                            class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:ring-2 focus:ring-emerald-500 outline-none font-mono">
                        <button onclick="saveApiKey()"
                            class="bg-emerald-600 hover:bg-emerald-700 px-6 rounded-xl text-white font-bold transition-all active:scale-95">Simpan</button>
                    </div>
                </div>
            </div>
        </div>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <aside class="lg:col-span-1">
                <div
                    class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 h-full lg:min-h-[600px] flex flex-col">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-slate-700 flex items-center gap-2 text-sm">
                            <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Riwayat Sastra
                        </h3>
                        <button onclick="clearHistory()"
                            class="text-[10px] text-red-400 font-bold uppercase tracking-wider">Hapus</button>
                    </div>
                    <div id="historyList" class="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-1"></div>
                </div>
            </aside>

            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-3 rounded-3xl shadow-sm border border-slate-200">
                    <textarea id="sourceInput" dir="rtl"
                        class="w-full p-4 h-32 rounded-2xl border-none focus:ring-0 outline-none text-2xl serif-font resize-none custom-scrollbar bg-slate-50/50"
                        placeholder="أدخل النص العربي..."></textarea>
                    <div class="flex items-center justify-between mt-3 px-2">
                        <div
                            class="flex items-center gap-2 text-[10px] text-slate-400 font-medium uppercase tracking-widest">
                            <span id="charCount">0</span> Karakter • AI: <span id="activeModelIndicator"
                                class="text-emerald-600 font-bold">Gemini</span>
                        </div>
                        <button id="translateBtn"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-emerald-200 transition-all flex items-center gap-2 active:scale-95 text-sm">
                            <span>Terjemahkan</span>
                            <div id="loaderIcon"
                                class="hidden animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full">
                            </div>
                        </button>
                    </div>
                </div>

                <div class="book-container flex flex-col md:flex-row items-stretch">
                    <div id="leftPage" class="paper paper-sepia w-full md:w-1/2 p-6 md:p-10 flex flex-col relative">
                        <div class="flex justify-between items-center mb-4 border-b pb-2 border-slate-400/10"><span
                                class="text-[9px] uppercase tracking-widest font-bold opacity-40">Original
                                (Arabic)</span></div>
                        <div id="arabicContent"
                            class="serif-font text-2xl leading-relaxed text-right whitespace-pre-wrap flex-1 opacity-60 italic"
                            dir="rtl">Tulis teks Arab di atas...</div>
                    </div>
                    <div class="spine"></div>
                    <div id="rightPage"
                        class="paper paper-sepia w-full md:w-1/2 p-6 md:p-10 flex flex-col relative overflow-hidden">
                        <div class="flex justify-between items-center mb-4 border-b pb-2 border-slate-400/10"><span
                                class="text-[9px] uppercase tracking-widest font-bold opacity-40">Terjemahan
                                (Indonesia)</span></div>
                        <div class="absolute right-4 top-16 flex flex-col gap-2 z-20">
                            <button onclick="toggleAudio()"
                                class="p-3 bg-white/80 backdrop-blur rounded-2xl shadow-sm hover:bg-emerald-50 text-emerald-600 transition-all border border-slate-200 relative">
                                <svg id="playIcon" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                                </svg>
                                <svg id="pauseIcon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                                </svg>
                                <div id="ttsLoader"
                                    class="hidden absolute inset-0 flex items-center justify-center bg-white/90 rounded-2xl">
                                    <div
                                        class="w-4 h-4 border-2 border-emerald-600 border-t-transparent animate-spin rounded-full">
                                    </div>
                                </div>
                            </button>
                            <button id="stopBtn" onclick="stopAudio()"
                                class="p-3 bg-white/80 backdrop-blur rounded-2xl shadow-sm hover:bg-red-50 text-red-500 transition-all border border-slate-200 hidden"><svg
                                    class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M6 6h12v12H6z" />
                                </svg></button>
                            <button onclick="document.getElementById('audioSettings').classList.toggle('hidden')"
                                class="p-3 bg-white/80 backdrop-blur rounded-2xl shadow-sm hover:bg-blue-50 text-blue-600 transition-all border border-slate-200"><svg
                                    class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg></button>
                        </div>

                        <div id="audioSettings"
                            class="hidden absolute right-20 top-16 w-48 bg-white/95 backdrop-blur-md p-4 rounded-3xl shadow-xl border border-slate-200 z-30">
                            <div class="flex flex-col gap-4">
                                <div>
                                    <div
                                        class="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">
                                        <span>Pitch</span><span id="pitchVal">0.85</span>
                                    </div>
                                    <input type="range" id="pitchInp" min="0.1" max="2" step="0.05" value="0.85"
                                        class="w-full h-1 bg-slate-200 rounded-lg accent-emerald-500"
                                        oninput="updateAudioLabels()">
                                </div>
                                <div>
                                    <div
                                        class="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">
                                        <span>Rate</span><span id="rateVal">0.9</span>
                                    </div>
                                    <input type="range" id="rateInp" min="0.1" max="2" step="0.05" value="0.9"
                                        class="w-full h-1 bg-slate-200 rounded-lg accent-emerald-500"
                                        oninput="updateAudioLabels()">
                                </div>
                                <button onclick="resetAudioSettings()"
                                    class="text-[9px] text-center text-slate-400 font-bold uppercase hover:text-emerald-600">Atur
                                    Ulang</button>
                            </div>
                        </div>

                        <div id="indoContent"
                            class="serif-font text-xl leading-relaxed whitespace-pre-wrap flex-1 custom-scrollbar overflow-y-auto pt-4">
                            Hasil terjemahan muncul di sini.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="readingOverlay" class="p-8 md:p-20">
        <button onclick="toggleReadingMode()"
            class="fixed top-6 right-6 p-3 bg-slate-800 text-white rounded-full shadow-xl hover:scale-110 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <div class="max-w-3xl mx-auto space-y-12">
            <div id="readArabic"
                class="serif-font text-4xl md:text-6xl text-right leading-loose border-b border-slate-200 pb-12"
                dir="rtl"></div>
            <div id="readIndo" class="serif-font text-2xl md:text-3xl leading-relaxed italic opacity-80"></div>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur text-white px-5 py-2.5 rounded-2xl shadow-2xl opacity-0 transition-all z-50 text-xs">
        Pesan</div>

    <script>
        // State variables
        let currentProvider = localStorage.getItem('linguist_provider') || 'gemini';
        let geminiKey = localStorage.getItem('gemini_api_key') || '';
        let openaiKey = localStorage.getItem('openai_api_key') || '';
        let currentFontSize = 18;
        let translationHistory = JSON.parse(localStorage.getItem('linguistHistory') || '[]');
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isDarkMode = localStorage.getItem('linguist_dark_mode') === 'true';

        // UI Functions
        function toggleGlobalDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            localStorage.setItem('linguist_dark_mode', isDarkMode);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (isDarkMode) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
            }
        }

        function toggleReadingMode() {
            const isReading = document.body.classList.toggle('reading-active');
            if (isReading) {
                document.getElementById('readArabic').textContent = document.getElementById('arabicContent').textContent;
                document.getElementById('readIndo').textContent = document.getElementById('indoContent').textContent;
            }
        }

        function toggleSettings() {
            const panel = document.getElementById('apiKeyPanel');
            panel.classList.toggle('hidden');
        }

        function switchProvider(p) {
            currentProvider = p;
            localStorage.setItem('linguist_provider', p);
            updateProviderUI();
        }

        function updateProviderUI() {
            const isGemini = currentProvider === 'gemini';
            document.getElementById('btnGemini').className = isGemini ? 'flex-1 py-3 px-4 rounded-xl border-2 border-emerald-600 bg-emerald-50 text-emerald-700 font-bold text-sm flex items-center justify-center gap-2' : 'flex-1 py-3 px-4 rounded-xl border-2 border-slate-200 text-slate-400 font-bold text-sm flex items-center justify-center gap-2';
            document.getElementById('btnOpenAI').className = !isGemini ? 'flex-1 py-3 px-4 rounded-xl border-2 border-emerald-600 bg-emerald-50 text-emerald-700 font-bold text-sm flex items-center justify-center gap-2' : 'flex-1 py-3 px-4 rounded-xl border-2 border-slate-200 text-slate-400 font-bold text-sm flex items-center justify-center gap-2';
            document.getElementById('keyLabel').textContent = isGemini ? 'Gemini' : 'OpenAI';
            document.getElementById('apiKeyInput').value = isGemini ? geminiKey : openaiKey;
            document.getElementById('activeModelIndicator').textContent = isGemini ? 'Gemini' : 'ChatGPT';
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if (currentProvider === 'gemini') {
                geminiKey = val;
                localStorage.setItem('gemini_api_key', val);
            } else {
                openaiKey = val;
                localStorage.setItem('openai_api_key', val);
            }
            showToast(`Kunci ${currentProvider} disimpan.`);
            toggleSettings();
        }

        async function translateText(text) {
            const sys = `Terjemahkan teks berikut ke Bahasa Indonesia secara lengkap, secara menyeluruh.

            Aturan output:
            - Hanya gunakan huruf dan spasi
            - Hindari semua simbol dan tanda baca kecuali titik
            - Jangan gunakan markdown atau formatting apapun
            - Jangan tambahkan penjelasan apapun

            Output hanya teks final.`;

            if (currentProvider === 'gemini') {
                if (!geminiKey) throw new Error("API Key Gemini belum diisi.");
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${geminiKey}`;
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `${sys}\n\nTeks: ${text}` }] }] })
                });
                const data = await resp.json();
                if (data.error) throw new Error(data.error.message);
                return data.candidates[0].content.parts[0].text;
            } else {
                if (!openaiKey) throw new Error("API Key OpenAI belum diisi.");
                const resp = await fetch(`https://api.openai.com/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openaiKey}` },
                    body: JSON.stringify({ model: "gpt-4o-mini", messages: [{ role: "system", content: sys }, { role: "user", content: text }] })
                });
                const data = await resp.json();
                if (data.error) throw new Error(data.error.message);
                return data.choices[0].message.content;
            }
        }

        document.getElementById('translateBtn').onclick = async () => {
            const input = document.getElementById('sourceInput').value.trim();
            if (!input) return showToast("Masukkan teks Arab!");

            const btn = document.getElementById('translateBtn');
            const loader = document.getElementById('loaderIcon');
            const indoBox = document.getElementById('indoContent');

            btn.disabled = true;
            loader.classList.remove('hidden');
            indoBox.innerHTML = "<div class='loading-shimmer h-4 w-full rounded mb-2'></div><div class='loading-shimmer h-4 w-2/3 rounded'></div>";

            try {
                const result = await translateText(input);
                indoBox.textContent = result;
                document.getElementById('arabicContent').textContent = input;
                document.getElementById('rightPage').classList.add('page-active');
                setTimeout(() => document.getElementById('rightPage').classList.remove('page-active'), 800);
                addToHistory(input, result);
            } catch (err) {
                indoBox.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-xl text-xs border border-red-100">Kesalahan: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        };

        function toggleAudio() {
            const text = document.getElementById('indoContent').textContent;
            if (!text || text.includes("muncul di sini")) return showToast("Belum ada teks.");

            if (synth.speaking && !synth.paused) {
                synth.pause();
                updateUI('paused');
            } else if (synth.paused) {
                synth.resume();
                updateUI('playing');
            } else {
                const loader = document.getElementById('ttsLoader');
                loader.classList.remove('hidden');
                setTimeout(() => startSpeaking(text), 400);
            }
        }

        function startSpeaking(text) {
            synth.cancel();
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'id-ID';
            const v = synth.getVoices().find(v => v.lang.includes('id') && v.name.toLowerCase().includes('male')) || synth.getVoices().find(v => v.lang.includes('id'));
            if (v) currentUtterance.voice = v;
            currentUtterance.pitch = parseFloat(document.getElementById('pitchInp').value);
            currentUtterance.rate = parseFloat(document.getElementById('rateInp').value);
            currentUtterance.onstart = () => { document.getElementById('ttsLoader').classList.add('hidden'); updateUI('playing'); };
            currentUtterance.onend = () => updateUI('stopped');
            synth.speak(currentUtterance);
        }

        function stopAudio() { synth.cancel(); updateUI('stopped'); }

        function updateUI(st) {
            const p = document.getElementById('playIcon'), ps = document.getElementById('pauseIcon'), s = document.getElementById('stopBtn');
            if (st === 'playing') { p.classList.add('hidden'); ps.classList.remove('hidden'); s.classList.remove('hidden'); }
            else if (st === 'paused') { p.classList.remove('hidden'); ps.classList.add('hidden'); s.classList.remove('hidden'); }
            else { p.classList.remove('hidden'); ps.classList.add('hidden'); s.classList.add('hidden'); }
        }

        function updateAudioLabels() {
            document.getElementById('pitchVal').textContent = document.getElementById('pitchInp').value;
            document.getElementById('rateVal').textContent = document.getElementById('rateInp').value;
        }

        function resetAudioSettings() {
            document.getElementById('pitchInp').value = 0.85;
            document.getElementById('rateInp').value = 0.9;
            updateAudioLabels();
        }

        function addToHistory(arab, indo) {
            translationHistory.unshift({ id: Date.now(), arab, indo });
            if (translationHistory.length > 15) translationHistory.pop();
            localStorage.setItem('linguistHistory', JSON.stringify(translationHistory));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = translationHistory.map(h => `
                <div onclick="loadH('${h.id}')" class="p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-emerald-50 border border-transparent hover:border-emerald-200 transition-all">
                    <div class="text-right text-xs truncate font-bold text-emerald-800" dir="rtl">${h.arab}</div>
                    <div class="text-[9px] text-slate-400 mt-1 uppercase">Klik untuk buka</div>
                </div>
            `).join('');
        }

        function loadH(id) {
            const h = translationHistory.find(x => x.id == id);
            if (h) {
                document.getElementById('sourceInput').value = h.arab;
                document.getElementById('arabicContent').textContent = h.arab;
                document.getElementById('indoContent').textContent = h.indo;
                showToast("Memori dimuat.");
            }
        }

        function clearHistory() {
            translationHistory = [];
            localStorage.removeItem('linguistHistory');
            renderHistory();
        }

        function setTheme(t) {
            const p = [document.getElementById('leftPage'), document.getElementById('rightPage')];
            p.forEach(x => {
                x.classList.remove('paper-sepia', 'paper-white', 'paper-dark');
                x.classList.add('paper-' + t);
            });
        }

        function changeFontSize(d) {
            currentFontSize += d;
            document.getElementById('indoContent').style.fontSize = currentFontSize + 'px';
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        }

        window.onload = () => {
            if (isDarkMode) document.body.classList.add('dark-mode');
            updateThemeIcon();
            updateProviderUI();
            renderHistory();
            document.getElementById('sourceInput').oninput = (e) => document.getElementById('charCount').textContent = e.target.value.length;
        };
    </script>
</body>

</html>
